<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알바급여정석 다운로드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .btn-android { background: #4285F4; color: #fff; }
    .btn-ios { background: #000; color: #fff; }
    .btn:hover { opacity: 0.9; }
    .redirect-msg { font-size: 13px; color: #999; margin-top: 12px; }
  </style>
  <script>
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      var androidUrl = 'https://play.google.com/store/apps/details?id=com.standard.albapay';
      var iosUrl = 'https://apps.apple.com/app/id6762085252';

      // 자동 리다이렉트 (2초 후)
      if (isAndroid) {
        setTimeout(function() { window.location.href = androidUrl; }, 1500);
      } else if (isIOS) {
        setTimeout(function() { window.location.href = iosUrl; }, 1500);
      }
    })();
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">📱</div>
    <h1>알바급여정석</h1>
    <p>출퇴근 관리부터 급여 계산까지<br>노무 컴플라이언스 올인원 솔루션</p>

    <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.standard.albapay">
      🤖 Google Play 다운로드
    </a>
    <a class="btn btn-ios" href="https://apps.apple.com/app/id6762085252">
       App Store 다운로드
    </a>

    <p class="redirect-msg" id="redirect-msg"></p>
  </div>

  <script>
    var ua = navigator.userAgent || '';
    if (/android/i.test(ua)) {
      document.getElementById('redirect-msg').textContent = '안드로이드가 감지되었습니다. 잠시 후 Google Play로 이동합니다…';
    } else if (/iPad|iPhone|iPod/.test(ua)) {
      document.getElementById('redirect-msg').textContent = '아이폰이 감지되었습니다. 잠시 후 App Store로 이동합니다…';
    }
  </script>
</body>
</html>
