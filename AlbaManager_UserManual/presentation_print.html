<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>알바급여정석 워크플로우</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #ffffff; 
        }
        .slide { 
            display: block; 
            break-after: page; /* Ensure each slide is on a new page */
            page-break-after: always;
            text-align: center; 
            padding-top: 20px;
            height: 100vh;
            box-sizing: border-box;
        }
        .app-screenshot { 
            max-width: 80%; 
            max-height: 80vh; 
            object-fit: contain; 
            border: 4px solid #374151; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); 
        }
        .caption-bar { 
            margin-top: 30px; 
            font-size: 24px; 
            font-weight: bold; 
            color: #111827; 
            background: #f3f4f6;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 15px;
        }
        
        @page {
            size: A4 portrait;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="slide">
        <img src="images/login_screen.png" class="app-screenshot">
        <div class="caption-bar">1. 사장님 간편 로그인</div>
    </div>
    
    <div class="slide">
        <img src="images/store_setup_top.png" class="app-screenshot">
        <div class="caption-bar">2. 사업장 정보 등록</div>
    </div>
    
    <div class="slide">
        <img src="images/add_staff_top.png" class="app-screenshot">
        <div class="caption-bar">3. 신규 직원 등록 (근무조건)</div>
    </div>
    
    <div class="slide">
        <img src="images/screen_5.png" class="app-screenshot">
        <div class="caption-bar">4. 직원에게 초대코드 발송</div>
    </div>
    
    <div class="slide">
        <img src="images/labor_contract.png" class="app-screenshot">
        <div class="caption-bar">5. 전자 근로계약서 자동 작성</div>
    </div>
    
    <div class="slide" style="break-after: auto; page-break-after: auto;">
        <img src="images/alba_web_doc.png" class="app-screenshot">
        <div class="caption-bar">6. 직원 확인 및 전자 서명 (교부 완료)</div>
    </div>
</body>
</html>
